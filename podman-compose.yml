version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      - POSTGRES_USER=portfolio_user
      - POSTGRES_PASSWORD=portfolio_local_dev
      - POSTGRES_DB=portfolio_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - portfolio-network

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: portfolio-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://portfolio_user:portfolio_local_dev@db:5432/portfolio_db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: portfolio-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  backend_data:
    driver: local
  frontend_data:
    driver: local
